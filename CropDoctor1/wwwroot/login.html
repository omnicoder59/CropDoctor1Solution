<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Crop Doctor</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">Crop Doctor</a>
        <div class="nav-links">
            <a href="/">AI Analyzer</a>
            <a href="/crops.html" class="requires-auth" style="display: none;">Crop Advisor</a>
            <a href="/news.html">News</a>
            <a href="/login.html" class="no-auth active" style="display: none;">Login</a>
            <a href="/register.html" class="no-auth" style="display: none;">Register</a>
        </div>
        <div class="user-area">
            <span id="user-status"></span>
            <button id="logout-btn" style="display: none;">Logout</button>
        </div>
    </nav>

    <div class="main-content">
        <div class="container form-container">
            <h2>Login</h2>
            <form id="login-form">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Login</button>
                <p id="error-message" style="color:red; height: 20px;"></p>
            </form>
            <p>Don't have an account? <a href="/register.html">Register here</a></p>
        </div>
    </div>

    <script src="/js/main.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');
            errorMessage.textContent = '';

            try {
                const response = await fetch('/api/account/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    window.location.href = '/'; // Redirect to homepage on success
                } else {
                    errorMessage.textContent = 'Invalid email or password.';
                }
            } catch (error) {
                errorMessage.textContent = 'An error occurred. Please try again.';
            }
        });
    </script>
</body>
</html>
