version: '3.8'

services:
  cropdoctor:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
      - "8443:443"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=CropDoctorDB;User Id=sa;Password=CropDoctor@123;TrustServerCertificate=true;Encrypt=true;"
    depends_on:
      - sqlserver
    networks:
      - cropdoctor-network
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "CropDoctor@123"
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_MEMORY_LIMIT_MB: 2048
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - cropdoctor-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'CropDoctor@123' -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

volumes:
  sqlserver-data:

networks:
  cropdoctor-network:
    driver: bridge
